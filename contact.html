<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Me</title>
</head>

<body>
<div style="background:#36363d; padding:20px; color:white;">

    <h1 style="text-align:center;">Contact Me</h1>

    <div style="text-align:center; margin-bottom:20px;">
        <a href="index.html" style="color:#4da6ff; margin: 0 15px;">Home</a>
        <a href="project.html" style="color:#4da6ff; margin: 0 15px;">Projects</a>
        <a href="contact.html" style="color:#4da6ff; margin: 0 15px;">Contact</a>
    </div>

    <p style="font-size:18px; line-height:1.5;">
        If you’d like to reach out to me, fill out the form below and I’ll get back to you.
    </p>

    <form action="#" method="post" style="background:#2e2e33; padding:20px; border-radius:10px;">

        <label>Your Name:</label><br>
        <input type="text" style="width:95%; padding:8px; margin-bottom:15px; background:#4da6ff; border:none;"><br>

        <label>Your Email:</label><br>
        <input type="text" style="width:95%; padding:8px; margin-bottom:15px; background:#4da6ff; border:none;"><br>

        <label>Reason for Contact:</label><br>
        <select style="width:95%; padding:8px; margin-bottom:15px; background:#4da6ff; border:none;">
            <option>--Select--</option>
            <option>General Question</option>
            <option>School Project</option>
            <option>Fitness / Nutrition</option>
            <option>Army / Career Advice</option>
        </select><br>

        <label>How urgent is this?</label><br>
        <label><input type="radio" name="urgency"> Low</label><br>
        <label><input type="radio" name="urgency"> Medium</label><br>
        <label><input type="radio" name="urgency"> High</label><br><br>

        <label>Your Message:</label><br>
        <textarea style="width:95%; height:120px; padding:8px; background:#4da6ff; border:none;">Enter your message...</textarea><br><br>

        <button type="submit" style="background:green; color:white; padding:10px 20px; border:none; margin-right:10px;">Submit</button>
        <button type="reset" style="background:red; color:white; padding:10px 20px; border:none;">Reset</button>

    </form>

</div>
</body>
</html>
